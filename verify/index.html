<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in - Natal Hair 2026</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <section id="login-section" class="container">
        <img src="../logo.png" alt="Natal Hair Logo" class="logo">
        <h2>Acesso Administrativo</h2>
        <div class="input-group">
            <input type="password" id="admin-password" placeholder="Digite a senha de acesso" required>
        </div>
        <button id="login-btn">Entrar</button>
        <div id="login-error" class="error-msg">Senha incorreta ou erro de conexão.</div>
    </section>

    <main id="dashboard-section" class="hidden">
        <header class="dash-header">
            <img src="../logo.png" alt="Natal Hair Logo" class="logo-small">
            <h1 id="current-date-display">Data Atual</h1>
            <h2 id="current-table-display" class="table-badge">Buscando tabela...</h2>
        </header>

        <div class="action-bar">
            <button id="open-scanner-btn" class="scan-btn">📷 Escanear QR Code</button>
        </div>

        <section class="user-list">
            <h3>Participantes no evento (Hoje)</h3>
            <div id="cards-container" class="cards-grid">
                </div>
        </section>
    </main>

    <div id="scanner-modal" class="modal hidden">
        <div class="modal-content">
            <button id="close-scanner-btn" class="close-btn">X</button>
            <h2>Leitura de Ingresso</h2>
            
            <div class="camera-wrapper">
                <div id="reader"></div>
                <div class="scanner-overlay">
                    <div class="scanner-frame"></div>
                </div>
            </div>

            <p id="scanner-feedback" class="feedback-msg"></p>

            <button id="manual-entry-btn" class="secondary-btn">Não tem mais o QR Code?</button>
        </div>
    </div>

    <div id="manual-modal" class="modal hidden">
        <div class="modal-content">
            <button id="close-manual-btn" class="close-btn">X</button>
            <h2>Entrada Manual</h2>
            <div class="input-group">
                <label>CPF ou CNPJ</label>
                <input type="text" id="manual-cpf" placeholder="Apenas números">
            </div>
            <button id="submit-manual-btn">Registrar Check-in</button>
            <p id="manual-feedback" class="feedback-msg"></p>
        </div>
    </div>

    <div id="hidden-qrcode" class="hidden"></div>

    <script src="qrcode.js"></script>
    <script src="chekin.js"></script>
</body>
</html>
