<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Natal Hair 2026</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Bibliotecas Necessárias -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <header class="admin-header">
        <div class="logo-container">
            <!-- Substitua pelo caminho real da sua logo, se necessário -->
            <img src="../logo.png" alt="Natal Hair 2026 Logo" class="logo" onerror="this.style.display='none'">
            <h1>Painel de Controle - Relatórios</h1>
        </div>
    </header>

    <main class="container">
        <!-- CARTÃO 1: RESUMO -->
        <section class="card summary-card">
            <h2>Resumo de Acessos</h2>
            <div class="stats-container">
                <div class="stat-box">
                    <h3>Dia 1</h3>
                    <p id="count-dia1">Carregando...</p>
                </div>
                <div class="stat-box">
                    <h3>Dia 2</h3>
                    <p id="count-dia2">Carregando...</p>
                </div>
            </div>
        </section>

        <!-- CARTÃO 2: DIA 1 -->
        <section class="card data-card">
            <div class="card-header">
                <h2>Check-ins: Dia 1</h2>
                <button id="btn-export-dia1" class="btn-primary">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Exportar PDF
                </button>
            </div>
            <div class="table-responsive">
                <table id="table-dia1">
                    <thead>
                        <tr>
                            <th>Nome completo</th>
                            <th>Data e Hora</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-dia1">
                        <tr><td colspan="2" class="loading-text">Carregando dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- CARTÃO 3: DIA 2 -->
        <section class="card data-card">
            <div class="card-header">
                <h2>Check-ins: Dia 2</h2>
                <button id="btn-export-dia2" class="btn-primary">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Exportar PDF
                </button>
            </div>
            <div class="table-responsive">
                <table id="table-dia2">
                    <thead>
                        <tr>
                            <th>Nome completo</th>
                            <th>Data e Hora</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-dia2">
                        <tr><td colspan="2" class="loading-text">Carregando dados...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
